<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile - Flask Blog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
        }
        .auth-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        .profile-image-container {
            position: relative;
            display: inline-block;
        }
        .profile-image-container::before {
            content: '';
            position: absolute;
            top: -5px;
            left: -5px;
            right: -5px;
            bottom: -5px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            z-index: -1;
            animation: rotate 3s linear infinite;
        }
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="{{ url_for('index') }}">
                <i class="fas fa-blog me-2"></i>FlaskBlog
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="{{ url_for('index') }}">
                    <i class="fas fa-home me-1"></i>Home
                </a>
                <a class="nav-link" href="{{ url_for('profile', user_id=current_user.id) }}">
                    <i class="fas fa-user me-1"></i>Profile
                </a>
                <a class="nav-link" href="{{ url_for('logout') }}">
                    <i class="fas fa-sign-out-alt me-1"></i>Logout
                </a>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card auth-card">
                    <div class="card-body p-4">
                        <h2 class="card-title text-center mb-4">
                            <i class="fas fa-user-edit me-2"></i>Edit Profile
                        </h2>
                        
                        <!-- Flash Messages -->
                        {% with messages = get_flashed_messages(with_categories=true) %}
                            {% if messages %}
                                {% for category, message in messages %}
                                    <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                                        <i class="fas 
                                            {% if category == 'success' %}fa-check-circle
                                            {% elif category == 'danger' %}fa-exclamation-circle
                                            {% elif category == 'warning' %}fa-exclamation-triangle
                                            {% else %}fa-info-circle{% endif %}
                                            me-2"></i>
                                        {{ message }}
                                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                                    </div>
                                {% endfor %}
                            {% endif %}
                        {% endwith %}
                        
                        <form method="POST" enctype="multipart/form-data">
                            <div class="row">
                                <div class="col-md-4 text-center mb-4">
                                    <div class="profile-image-container mb-3">
                                        <img src="{{ url_for('static', filename='profile_pics/' + current_user.profile_image) }}" 
                                             class="rounded-circle" width="150" height="150" alt="Current Profile" id="currentImage">
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Update Profile Picture</label>
                                        <input type="file" class="form-control" name="picture" accept="image/*" id="imageInput">
                                        <div class="form-text">JPG, PNG, or GIF. Max 16MB</div>
                                    </div>
                                    <div class="image-preview mt-3" id="previewImage" style="display: none;"></div>
                                </div>
                                
                                <div class="col-md-8">
                                    <div class="mb-3">
                                        <label class="form-label">Username</label>
                                        <input type="text" class="form-control" name="username" value="{{ current_user.username }}" required>
                                    </div>
                                    
                                    <div class="mb-3">
                                        <label class="form-label">Email</label>
                                        <input type="email" class="form-control" name="email" value="{{ current_user.email }}" required>
                                    </div>
                                    
                                    <div class="mb-4">
                                        <label class="form-label">Bio</label>
                                        <textarea class="form-control" name="bio" rows="4" placeholder="Tell us about yourself..." maxlength="500">{{ current_user.bio or '' }}</textarea>
                                        <div class="form-text">Max 500 characters. <span id="bioCounter">0</span>/500</div>
                                    </div>
                                    
                                    <div class="d-grid gap-2">
                                        <button type="submit" class="btn btn-primary py-2">
                                            <i class="fas fa-save me-2"></i>Save Changes
                                        </button>
                                        <a href="{{ url_for('profile', user_id=current_user.id) }}" class="btn btn-outline-secondary">
                                            <i class="fas fa-times me-2"></i>Cancel
                                        </a>
                                    </div>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const imageInput = document.getElementById('imageInput');
            const preview = document.getElementById('previewImage');
            const currentImage = document.getElementById('currentImage');
            const bioTextarea = document.querySelector('textarea[name="bio"]');
            const bioCounter = document.getElementById('bioCounter');
            
            // Initialize bio counter
            if (bioTextarea && bioCounter) {
                bioCounter.textContent = bioTextarea.value.length;
                bioTextarea.addEventListener('input', function() {
                    bioCounter.textContent = this.value.length;
                });
            }
            
            // Image preview functionality
            if (imageInput) {
                imageInput.addEventListener('change', function(event) {
                    const file = event.target.files[0];
                    
                    if (file) {
                        // Validate file type
                        const validTypes = ['image/jpeg', 'image/jpg', 'image/png', 'image/gif'];
                        if (!validTypes.includes(file.type)) {
                            alert('Please select a valid image file (JPG, PNG, or GIF)');
                            this.value = '';
                            return;
                        }
                        
                        // Validate file size (16MB)
                        if (file.size > 16 * 1024 * 1024) {
                            alert('File size must be less than 16MB');
                            this.value = '';
                            return;
                        }
                        
                        const reader = new FileReader();
                        reader.onload = function(e) {
                            preview.innerHTML = `
                                <div class="text-center">
                                    <p class="text-muted mb-2">New Profile Picture Preview:</p>
                                    <img src="${e.target.result}" class="rounded-circle shadow" width="120" height="120" alt="Preview">
                                    <p class="text-success small mt-2"><i class="fas fa-check me-1"></i>Image ready to upload</p>
                                </div>
                            `;
                            preview.style.display = 'block';
                            currentImage.style.opacity = '0.6';
                        };
                        reader.readAsDataURL(file);
                    } else {
                        preview.style.display = 'none';
                        currentImage.style.opacity = '1';
                    }
                });
            }
            
            // Form validation
            const form = document.querySelector('form');
            if (form) {
                form.addEventListener('submit', function(e) {
                    const username = form.querySelector('input[name="username"]').value.trim();
                    const email = form.querySelector('input[name="email"]').value.trim();
                    
                    if (!username) {
                        e.preventDefault();
                        alert('Username is required');
                        return;
                    }
                    
                    if (!email) {
                        e.preventDefault();
                        alert('Email is required');
                        return;
                    }
                    
                    // Show loading state
                    const submitBtn = form.querySelector('button[type="submit"]');
                    submitBtn.disabled = true;
                    submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Saving...';
                });
            }
        });
    </script>
</body>
</html>
